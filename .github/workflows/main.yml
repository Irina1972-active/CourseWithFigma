name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install   # используем npm install вместо npm ci (может не быть package-lock.json)

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4   # исправлено peaceris → peaceiris
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}   # исправлен синтаксис
          publish_dir: ./dist
          publish_branch: gh-pages
          enable_jekyll: true
          enable_jekyll: true
